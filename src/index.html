<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Annotator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Main drawing canvas -->
    <canvas id="canvas"></canvas>
    
    <!-- Tool indicator (shows current mode) -->
    <div id="tool-indicator">
        <span id="tool-name">RECTANGLE</span>
        <span id="tool-hint">R=Rect A=Arrow T=Text ESC=Clear</span>
    </div>
    
    <!-- Container for text inputs -->
    <div id="text-container"></div>
    
    <script src="main.js"></script>
</body>
</html>
